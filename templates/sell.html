<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>List Your Crop | FarmConnect</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        :root { --primary: #2ecc71; }
        body { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1920') center/cover fixed;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 20px; width: 400px;
            border: 1px solid rgba(255,255,255,0.2); border-top: 6px solid var(--primary);
            text-align: center; color: white;
        }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; 
            background: rgba(255,255,255,0.9); box-sizing: border-box; 
        }
        .login-btn { 
            width: 100%; padding: 15px; background: var(--primary); color: white; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px;
        }
        .login-btn:hover { background: #27ae60; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="color: var(--primary); margin-bottom: 10px;">🌾 Farmer's Portal</h2>
        <p style="font-size: 0.9rem; margin-bottom: 25px;">List your harvest for buyers nationwide</p>
        
        <form action="/post_sell" method="POST">
            <input type="text" name="crop_name" placeholder="Crop Name (e.g., Sona Masuri Rice)" required>
            <input type="text" name="quantity" placeholder="Quantity (e.g., 500 KG or 2 Tons)" required>
            <input type="number" name="price" placeholder="Price per KG (₹)" required>
            <input type="text" name="location" placeholder="Your Location (e.g., Warangal, TS)" required>
            <button type="submit" class="login-btn">🚀 List My Crop Now</button>
        </form>
        
        <br><a href="/" style="color: #bbb; text-decoration: none; font-size: 0.8rem;">← Cancel and go back</a>
    </div>
</body>
</html>
