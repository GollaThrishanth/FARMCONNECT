<!DOCTYPE html>
<html>
<head>
    <title>Sell Crops - FarmConnect</title>
    <style>
        :root { --primary: #2ecc71; --bg: #0f172a; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 40px; width: 500px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .form-control { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; box-sizing: border-box; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2 style="text-align: center; margin-bottom: 30px;">Post Your Crop for Sale</h2>
        <form action="/post_sell" method="POST" enctype="multipart/form-data">
            <input type="text" name="crop_name" placeholder="Crop Name (e.g. Basmati Rice)" required class="form-control">
            
            <div style="display: flex; gap: 10px;">
                <input type="text" name="quantity" placeholder="Quantity (e.g. 100kg)" required class="form-control">
                <input type="number" name="price" placeholder="Price/kg (₹)" required class="form-control">
            </div>

            <label>Crop Category</label>
            <select name="crop_type" class="form-control">
                <option value="Organic">Organic</option>
                <option value="Inorganic">Inorganic</option>
                <option value="Premium">Export Quality</option>
            </select>

            <label>Date of Harvest</label>
            <input type="date" name="harvest_date" required class="form-control">

            <input type="text" name="location" placeholder="Full Pickup Address" required class="form-control">

            <div style="border: 1px dashed rgba(255,255,255,0.2); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                <label>Upload Photo:</label>
                <input type="file" name="crop_image" accept="image/*" required>
                <br><br>
                <label>Upload Video (Optional):</label>
                <input type="file" name="crop_video" accept="video/*">
            </div>

            <button type="submit" class="btn-primary">List Crop in Marketplace</button>
        </form>
    </div>
</body>
</html>
