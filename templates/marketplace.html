<!DOCTYPE html>
<html>
<head>
    <title>Marketplace - FarmConnect</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        :root { --primary: #2ecc71; --bg: #0f172a; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 30px; 
            padding: 20px;
        }
        .crop-img { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; }
        
        /* WhatsApp Button Styling */
        .btn-whatsapp {
            background-color: #25D366;
            color: white !important;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
            border: none;
        }
        .btn-whatsapp:hover {
            background-color: #128C7E;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.4);
        }
        .whatsapp-icon {
            width: 20px;
            margin-right: 8px;
            filter: brightness(0) invert(1); /* Makes icon white */
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; margin-top: 50px; margin-bottom: 30px;">
        Live <span style="color: var(--primary);">Marketplace</span>
    </h1>
    
    <div class="grid">
        {% for crop in crops %}
        <div class="glass-card">
            <img src="{{ url_for('static', filename='uploads/' + crop[8]) }}" class="crop-img" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
            <h3>{{ crop[2] }}</h3>
            <p style="color: var(--primary); font-size: 1.2rem; font-weight: bold;">₹{{ crop[4] }} / kg</p>
            <p style="color: #aaa;">📍 {{ crop[5] }}</p>
            <p style="font-size: 0.9rem; margin-bottom: 10px;">Farmer: {{ crop[1] }}</p>
            
            <a href="{{ url_for('crop_details', crop_id=crop[0]) }}" class="btn-primary" style="display: block; width: 100%; text-decoration: none;">View Full Details</a>
            
            <a href="https://wa.me/91{{ crop[10] }}?text=Hi%20{{ crop[1] }},%20I%20saw%20your%20listing%20for%20{{ crop[2] }}%20on%20FarmConnect.%20Is%20it%20still%20available?" 
               target="_blank" 
               class="btn-whatsapp">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="whatsapp-icon">
                Chat with Farmer
            </a>
        </div>
        {% endfor %}
    </div>
</body>
</html>
