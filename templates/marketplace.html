<!DOCTYPE html>
<html>
<head>
    <title>Marketplace - FarmConnect</title>
    <style>
        :root { --primary: #2ecc71; --bg: #0f172a; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; padding: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 20px; transition: 0.3s; }
        .glass-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .crop-img { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; }
        .btn-detail { background: var(--primary); color: white; text-decoration: none; display: block; text-align: center; padding: 12px; border-radius: 10px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h1 style="text-align: center; margin-bottom: 50px;">Live <span style="color: var(--primary);">Marketplace</span></h1>
    
    <div class="grid">
        {% for crop in crops %}
        <div class="glass-card">
            <img src="{{ url_for('static', filename='uploads/' + crop[8]) }}" class="crop-img" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
            <h3>{{ crop[2] }}</h3>
            <p style="color: var(--primary); font-size: 1.2rem; font-weight: bold;">₹{{ crop[4] }} / kg</p>
            <p style="color: #aaa;">📍 {{ crop[5] }}</p>
            <p style="font-size: 0.9rem;">Farmer: {{ crop[1] }}</p>
            <a href="{{ url_for('crop_details', crop_id=crop[0]) }}" class="btn-detail">View Full Details</a>
        </div>
        {% endfor %}
    </div>
</body>
</html>
