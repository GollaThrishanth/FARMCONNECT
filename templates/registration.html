<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | FarmConnect</title>
    <style>
        :root { --primary: #2ecc71; --bg: #f4fff9; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 450px; position: relative; }
        .input-group { margin-bottom: 12px; }
        label { font-size: 11px; font-weight: bold; color: #7f8c8d; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        #lang-switch { position: absolute; top: 15px; right: 15px; }
    </style>
</head>
<body>
<div class="card">
    <select id="lang-switch" onchange="updateUI()">
        <option value="en">English</option>
        <option value="te">Telugu</option>
        <option value="hi">Hindi</option>
        <option value="ta">Tamil</option>
        <option value="kn">Kannada</option>
    </select>
    <h2 id="reg-title" style="text-align:center">Register</h2>
    
    <form action="/post_register" method="POST">
        <div class="input-group">
            <label id="l-type">REGISTER AS</label>
            <select name="user_type" required>
                <option value="farmer">Farmer</option>
                <option value="buyer">Buyer</option>
            </select>
        </div>

        <div class="input-group">
            <label id="l-name">FULL NAME</label>
            <input type="text" name="name" required>
        </div>

        <div class="input-group">
            <label>COUNTRY</label>
            <input type="text" name="country" value="India" readonly>
        </div>

        <div class="input-group">
            <label id="l-state">STATE</label>
            <select name="state" required>
                <option value="Andhra Pradesh">Andhra Pradesh</option>
                <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                <option value="Assam">Assam</option>
                <option value="Bihar">Bihar</option>
                <option value="Chhattisgarh">Chhattisgarh</option>
                <option value="Goa">Goa</option>
                <option value="Gujarat">Gujarat</option>
                <option value="Haryana">Haryana</option>
                <option value="Himachal Pradesh">Himachal Pradesh</option>
                <option value="Jharkhand">Jharkhand</option>
                <option value="Karnataka">Karnataka</option>
                <option value="Kerala">Kerala</option>
                <option value="Madhya Pradesh">Madhya Pradesh</option>
                <option value="Maharashtra">Maharashtra</option>
                <option value="Manipur">Manipur</option>
                <option value="Meghalaya">Meghalaya</option>
                <option value="Mizoram">Mizoram</option>
                <option value="Nagaland">Nagaland</option>
                <option value="Odisha">Odisha</option>
                <option value="Punjab">Punjab</option>
                <option value="Rajasthan">Rajasthan</option>
                <option value="Sikkim">Sikkim</option>
                <option value="Tamil Nadu">Tamil Nadu</option>
                <option value="Telangana">Telangana</option>
                <option value="Tripura">Tripura</option>
                <option value="Uttar Pradesh">Uttar Pradesh</option>
                <option value="Uttarakhand">Uttarakhand</option>
                <option value="West Bengal">West Bengal</option>
                <option value="Andaman and Nicobar">Andaman and Nicobar Islands</option>
                <option value="Chandigarh">Chandigarh</option>
                <option value="Dadra and Nagar Haveli">Dadra and Nagar Haveli and Daman and Diu</option>
                <option value="Delhi">Delhi</option>
                <option value="Jammu and Kashmir">Jammu and Kashmir</option>
                <option value="Ladakh">Ladakh</option>
                <option value="Lakshadweep">Lakshadweep</option>
                <option value="Puducherry">Puducherry</option>
            </select>
        </div>

        <div class="input-group">
            <label id="l-dist">DISTRICT</label>
            <input type="text" name="district" required>
        </div>

        <div class="input-group">
            <label id="l-phone">PHONE NUMBER</label>
            <input type="tel" name="phone" required>
        </div>

        <div class="input-group">
            <label id="l-aadhar">AADHAAR NUMBER</label>
            <input type="text" name="aadhar" required>
        </div>

        <div class="input-group">
            <label id="l-pass">PASSWORD</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit" class="btn" id="reg-btn">Register</button>
    </form>
</div>

<script>
    const data = {
        en: { title:"Register", type:"REGISTER AS", name:"FULL NAME", state:"STATE", dist:"DISTRICT", phone:"PHONE NUMBER", aadhar:"AADHAAR NUMBER", pass:"PASSWORD", btn:"Register" },
        te: { title:"నమోదు", type:"ఇలా నమోదు చేయండి", name:"పూర్తి పేరు", state:"రాష్ట్రం", dist:"జిల్లా", phone:"ఫోన్ నంబర్", aadhar:"ఆధార్ సంఖ్య", pass:"పాస్వర్డ్", btn:"నమోదు చేయండి" },
        hi: { title:"पंजीकरण", type:"के रूप में पंजीकृत करें", name:"पूरा नाम", state:"राज्य", dist:"ज़िला", phone:"फ़ोन नंबर", aadhar:"आधार नंबर", pass:"पासवर्ड", btn:"रजिस्टर" },
        ta: { title:"பதிவு", type:"இப்படி பதிவு செய்க", name:"முழு பெயர்", state:"மாநிலம்", dist:"மாவட்டம்", phone:"தொலைபேசி எண்", aadhar:"ஆதார் எண்", pass:"கடவுச்சொல்", btn:"பதிவு செய்க" },
        kn: { title:"ನೋಂದಣಿ", type:"ಹೀಗೆ ನೋಂದಾಯಿಸಿ", name:"ಪೂರ್ಣ ಹೆಸರು", state:"ರಾಜ್ಯ", dist:"ಜಿಲ್ಲೆ", phone:"ಫೋನ್ ಸಂಖ್ಯೆ", aadhar:"ಆಧಾರ್ ಸಂಖ್ಯೆ", pass:"ಪಾಸ್ವರ್ಡ್", btn:"ನೋಂದಾಯಿಸಿ" }
    };
    
    function updateUI() {
        const l = document.getElementById('lang-switch').value;
        document.getElementById('reg-title').innerText = data[l].title;
        document.getElementById('l-type').innerText = data[l].type;
        document.getElementById('l-name').innerText = data[l].name;
        document.getElementById('l-state').innerText = data[l].state;
        document.getElementById('l-dist').innerText = data[l].dist;
        document.getElementById('l-phone').innerText = data[l].phone;
        document.getElementById('l-aadhar').innerText = data[l].aadhar;
        document.getElementById('l-pass').innerText = data[l].pass;
        document.getElementById('reg-btn').innerText = data[l].btn;
    }
</script>
</body>
</html>
