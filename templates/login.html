<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | FarmConnect</title>

<style>
:root { --primary: #2ecc71; --bg: #f4fff9; }

body {
    font-family: sans-serif;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    width: 380px;
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.btn {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

a {
    color: var(--primary);
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
    <h2>Login</h2>

    <form action="/post_login" method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="btn">Login</button>
    </form>

    <p>No account? <a href="{{ url_for('register') }}">Create Account</a></p>
</div>

</body>
</html>
